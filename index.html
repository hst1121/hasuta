<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>はすたの登るゲーム</title>
<style>
  body { margin:0; overflow:hidden; background:#0b1e2d; }
  canvas { display:block; margin:0 auto; background:#06131d; }
</style>
</head>
<body>
<canvas id="game" width="400" height="600"></canvas>
<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player = { x:200, y:500, vx:0, vy:0, r:10 };
let gravity = 0.3;
let platforms = [];
let cameraY = 0;

for(let i=0;i<50;i++){
  platforms.push({ x:Math.random()*350, y:600 - i*80, w:80, h:10 });
}

let keys={};
document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

function update(){
  // 左右移動
  if(keys["ArrowLeft"]) player.vx -= 0.5;
  if(keys["ArrowRight"]) player.vx += 0.5;

  player.vy += gravity;
  player.x += player.vx;
  player.y += player.vy;

  player.vx *= 0.9;

  // 足場判定
  platforms.forEach(p=>{
    if(player.x > p.x && player.x < p.x+p.w &&
       player.y+player.r > p.y && player.y+player.r < p.y+10 &&
       player.vy > 0){
      player.vy = -8; // ジャンプ
    }
  });

  // カメラ
  if(player.y < cameraY + 300){
    cameraY = player.y - 300;
  }
}

function draw(){
  ctx.clearRect(0,0,400,600);

  ctx.save();
  ctx.translate(0, -cameraY);

  // プレイヤー
  ctx.fillStyle = "#7FDBFF";
  ctx.beginPath();
  ctx.arc(player.x, player.y, player.r, 0, Math.PI*2);
  ctx.fill();

  // 足場
  ctx.fillStyle = "#3aa7ff";
  platforms.forEach(p=>{
    ctx.fillRect(p.x, p.y, p.w, p.h);
  });

  ctx.restore();

  // UI
  ctx.fillStyle="white";
  ctx.fillText("高さ: " + Math.floor(-cameraY), 10, 20);
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
