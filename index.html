<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>UNDERTALE Style - Clickable Edition</title>
    <style>
        body { background: #000; color: #fff; font-family: 'monospace'; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        #game-container { width: 600px; border: 4px solid #fff; padding: 20px; position: relative; background: #000; }
        
        /* 敵エリア */
        #enemy-sprite { width: 100px; height: 100px; background: #fff; margin: 0 auto 20px; transition: 0.1s; }
        
        /* メイン画面（メッセージと戦闘枠） */
        #display-area { position: relative; width: 500px; height: 150px; border: 4px solid #fff; margin: 0 auto; overflow: hidden; }
        #canvas { background: #000; display: none; } /* 戦闘時以外は隠す */
        #msg-box { padding: 15px; font-size: 20px; line-height: 1.5; height: 100%; box-sizing: border-box; }

        /* ステータス */
        #status { width: 500px; margin: 10px auto; font-size: 20px; }

        /* ボタンエリア */
        #command-menu { display: flex; justify-content: space-between; width: 500px; margin: 20px auto 0; }
        .btn { 
            border: 2px solid #e27d3c; color: #e27d3c; padding: 10px; width: 110px; 
            text-align: center; cursor: pointer; font-weight: bold; font-size: 16px;
            user-select: none;
        }
        .btn:hover, .btn.selected { background: #e27d3c; color: #fff; border-color: #fff; }

        /* ゲームオーバー */
        #game-over { 
            position: absolute; top:0; left:0; width:100%; height:100%; 
            background: #000; display: none; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 100; 
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="enemy-sprite"></div>

    <div id="display-area">
        <canvas id="canvas" width="500" height="150"></canvas>
        <div id="msg-box"></div>
    </div>

    <div id="status">PLAYER  HP <span id="hp">20</span> / 20</div>

    <div id="command-menu">
        <div class="btn" onclick="handleAction('ATTACK')" id="btn-0">たたかう</div>
        <div class="btn" onclick="handleAction('ACT')" id="btn-1">こうどう</div>
        <div class="btn" onclick="handleAction('ITEM')" id="btn-2">アイテム</div>
        <div class="btn" onclick="handleAction('SPARE')" id="btn-3">のがす</div>
    </div>

    <div id="game-over">
        <h1 style="color:red; font-size:50px;">GAME OVER</h1>
        <button onclick="location.reload()" style="padding:10px; cursor:pointer;">リトライ</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const msgBox = document.getElementById('msg-box');
    const hpDisplay = document.getElementById('hp');
    const enemy = document.getElementById('enemy-sprite');

    let state = 'WAIT'; // WAIT, BATTLE, ANIMATING
    let playerHP = 20;
    let bullets = [];
    let frame = 0;
    let battleTimer = 0;
    let playerPos = { x: 250, y: 75 };
    let keys = {};

    // --- キーボード入力 ---
    window.addEventListener('keydown', e => {
        keys[e.code] = true;
        if(e.code === 'Enter' && state === 'WAIT') handleAction('ATTACK');
    });
    window.addEventListener('keyup', e => keys[e.code] = false);

    // --- メッセージ表示関数 ---
    function typeMessage(text, nextState = 'WAIT') {
        state = 'ANIMATING';
        msgBox.style.display = 'block';
        canvas.style.display = 'none';
        msgBox.innerText = "";
        let i = 0;
        const timer = setInterval(() => {
            msgBox.innerText += text[i];
            i++;
            if (i >= text.length) {
                clearInterval(timer);
                state = nextState;
            }
        }, 30);
    }

    // --- ボタンが押された時の処理 ---
    function handleAction(action) {
        if (state !== 'WAIT') return; // アニメ中や戦闘中はボタン無効

        if (action === 'ATTACK') {
            enemy.style.background = 'red';
            setTimeout(() => enemy.style.background = '#fff', 100);
            typeMessage("＊ あなたの攻撃！ 敵に少しダメージを与えた。", 'START_BATTLE');
        } else if (action === 'SPARE') {
            typeMessage("＊ 逃げ出した！...が、回り込まれた！", 'START_BATTLE');
        } else {
            typeMessage("＊ 何も起きなかった。", 'START_BATTLE');
        }
    }

    // --- 敵のターン開始 ---
    function startBattle() {
        state = 'BATTLE';
        msgBox.style.display = 'none';
        canvas.style.display = 'block';
        battleTimer = 200; // 約3秒
        bullets = [];
        playerPos = { x: 250, y: 75 };
    }

    // --- メインループ ---
    function loop() {
        frame++;
        
        if (state === 'START_BATTLE') {
            setTimeout(startBattle, 500);
            state = 'ANIMATING';
        }

        if (state === 'BATTLE') {
            updateBattle();
            drawBattle();
        }

        // 敵をゆらゆらさせる
        enemy.style.transform = `translateX(${Math.sin(frame * 0.1) * 15}px)`;
        
        requestAnimationFrame(loop);
    }

    function updateBattle() {
        battleTimer--;
        if (battleTimer <= 0) {
            typeMessage("＊ 敵はまだこちらを睨んでいる。");
            return;
        }

        // プレイヤー移動
        if (keys['ArrowUp'] && playerPos.y > 10) playerPos.y -= 3;
        if (keys['ArrowDown'] && playerPos.y < 140) playerPos.y += 3;
        if (keys['ArrowLeft'] && playerPos.x > 10) playerPos.x -= 3;
        if (keys['ArrowRight'] && playerPos.x < 490) playerPos.x += 3;

        // 弾の生成
        if (frame % 20 === 0) {
            bullets.push({ x: Math.random() * 500, y: 0, speed: 3 });
        }

        // 衝突判定
        bullets.forEach((b, i) => {
            b.y += b.speed;
            const dist = Math.hypot(playerPos.x - b.x, playerPos.y - b.y);
            if (dist < 15) {
                playerHP = Math.max(0, playerHP - 0.1);
                hpDisplay.innerText = Math.ceil(playerHP);
                if (playerHP <= 0) {
                    document.getElementById('game-over').style.display = 'flex';
                }
            }
        });
    }

    function drawBattle() {
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, 500, 150);

        // ハート（自機）
        ctx.fillStyle = 'red';
        ctx.beginPath();
        ctx.arc(playerPos.x, playerPos.y, 8, 0, Math.PI * 2);
        ctx.fill();

        // 弾
        ctx.fillStyle = 'white';
        bullets.forEach(b => ctx.fillRect(b.x, b.y, 10, 10));
    }

    // 起動
    typeMessage("＊ モンスターがあらわれた！");
    loop();

</script>
</body>
</html>
