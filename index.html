<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>UNDERTALE Like Mini Game</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            width: 640px;
            height: 480px;
            border: 4px solid #fff;
        }
        canvas {
            display: block;
        }
        #ui-layer {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            height: 150px;
            border: 4px solid #fff;
            padding: 15px;
            background: #000;
            box-sizing: border-box;
            font-size: 24px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas" width="640" height="480"></canvas>
        <div id="ui-layer">
            <div id="text-box"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const textBox = document.getElementById('text-box');

        // ゲームの状態
        let state = 'DIALOG'; // DIALOG, BATTLE
        let frame = 0;

        // プレイヤー設定
        const player = {
            x: 320,
            y: 350,
            size: 16,
            speed: 4,
            hp: 20,
            maxHp: 20
        };

        // 敵の弾幕設定
        let bullets = [];
        const enemy = { name: "ナプスタブルック的ナニカ", hp: 100 };

        // キー入力管理
        const keys = {};
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        // テキスト演出用
        let fullText = "＊ どこからか 音楽が きこえてくる...";
        let displayText = "";
        let textIndex = 0;

        function updateText() {
            if (textIndex < fullText.length) {
                displayText += fullText[textIndex];
                textBox.innerText = displayText;
                textIndex++;
                setTimeout(updateText, 50);
            } else {
                // テキストが終わったら3秒後にバトルへ
                if(state === 'DIALOG') {
                    setTimeout(() => {
                        state = 'BATTLE';
                        fullText = "";
                        textBox.innerText = "＊ ぜったいに よけろ！";
                    }, 2000);
                }
            }
        }

        function spawnBullet() {
            if (frame % 20 === 0) {
                bullets.push({
                    x: Math.random() * 200 + 220,
                    y: 200,
                    vx: (Math.random() - 0.5) * 4,
                    vy: 3,
                    size: 8
                });
            }
        }

        function update() {
            frame++;

            if (state === 'BATTLE') {
                // 移動制限（枠の中だけ）
                if (keys['ArrowUp'] && player.y > 220) player.y -= player.speed;
                if (keys['ArrowDown'] && player.y < 420) player.y += player.speed;
                if (keys['ArrowLeft'] && player.x > 220) player.x -= player.speed;
                if (keys['ArrowRight'] && player.x < 420) player.x += player.speed;

                spawnBullet();

                // 弾の更新と衝突判定
                bullets.forEach((b, i) => {
                    b.x += b.vx;
                    b.y += b.vy;
                    
                    // 当たり判定
                    let dx = player.x - b.x;
                    let dy = player.y - b.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < (player.size/2 + b.size/2)) {
                        player.hp -= 0.1; // ダメージ
                        bullets.splice(i, 1);
                    }
                });

                // 画面外の弾を削除
                bullets = bullets.filter(b => b.y < 450);
            }

            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 敵の描画（ただの四角ですが、雰囲気で）
            ctx.fillStyle = '#fff';
            ctx.fillRect(270, 50 + Math.sin(frame * 0.05) * 10, 100, 100);

            if (state === 'BATTLE') {
                // 戦闘枠
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 4;
                ctx.strokeRect(210, 210, 220, 220);

                // プレイヤー（ソウル）
                ctx.fillStyle = '#ff0000';
                ctx.beginPath();
                // ハート型を描画
                const x = player.x, y = player.y, s = player.size;
                ctx.moveTo(x, y + s/4);
                ctx.quadraticCurveTo(x, y, x - s/2, y);
                ctx.quadraticCurveTo(x - s, y, x - s, y + s/2);
                ctx.quadraticCurveTo(x - s, y + s, x, y + s * 1.5);
                ctx.quadraticCurveTo(x + s, y + s, x + s, y + s/2);
                ctx.quadraticCurveTo(x + s, y, x + s/2, y);
                ctx.quadraticCurveTo(x, y, x, y + s/4);
                ctx.fill();

                // 弾
                ctx.fillStyle = '#fff';
                bullets.forEach(b => {
                    ctx.beginPath();
                    ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
                    ctx.fill();
                });

                // HPバー
                ctx.fillStyle = '#ff0';
                ctx.fillRect(210, 440, player.hp * 5, 15);
                ctx.fillStyle = '#fff';
                ctx.font = '16px Arial';
                ctx.fillText(`HP: ${Math.ceil(player.hp)} / ${player.maxHp}`, 320, 453);
            }
        }

        // 初期化
        updateText();
        update();
    </script>
</body>
</html>
