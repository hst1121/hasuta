<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>はすたの壺男クライミング 完成版</title>
<style>
  body { margin:0; overflow:hidden; background:#0b1e2d; }
  canvas { display:block; margin:0 auto; background:#06131d; cursor:none; }
  #controls { position:absolute; bottom:10px; left:50%; transform:translateX(-50%); color:#cfe9ff; font-size:12px; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="controls">マウスで棒を操作して「引っかけて登る」</div>
<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize(){ canvas.width=innerWidth; canvas.height=innerHeight; }
addEventListener("resize",resize); resize();

let player, rocks, cameraY, mouse, hook=null, maxY=0;

function init(){
  player={x:canvas.width/2,y:canvas.height-100,vx:0,vy:0,r:12};
  cameraY=0;
  mouse={x:0,y:0};

  rocks=[];
  let y=canvas.height-50;
  for(let i=0;i<40;i++){
    y -= 120 + Math.random()*40;
    rocks.push({
      x:Math.random()*(canvas.width-150),
      y:y,
      w:100+Math.random()*80,
      h:20+Math.random()*20
    });
  }
}
init();

canvas.addEventListener("mousemove",e=>{
  const rect=canvas.getBoundingClientRect();
  mouse.x=e.clientX-rect.left;
  mouse.y=e.clientY-rect.top;
});

let gravity=0.4;

function update(){
  let dx = mouse.x - player.x;
  let dy = (mouse.y+cameraY) - player.y;
  let dist = Math.sqrt(dx*dx+dy*dy);

  // 引っかけ判定
  if(!hook){
    rocks.forEach(r=>{
      if(mouse.x>r.x && mouse.x<r.x+r.w && (mouse.y+cameraY)>r.y && (mouse.y+cameraY)<r.y+r.h){
        hook={x:mouse.x, y:mouse.y+cameraY};
      }
    });
  }

  // フックされてる場合
  if(hook){
    let hx = hook.x - player.x;
    let hy = hook.y - player.y;
    let d = Math.sqrt(hx*hx+hy*hy);

    let force = 0.6;
    player.vx += hx/d * force;
    player.vy += hy/d * force;

    // 距離が伸びすぎたら外れる
    if(d>200) hook=null;
  }

  // 通常押し
  if(!hook && dist>0){
    player.vx -= dx/dist*0.2;
    player.vy -= dy/dist*0.2;
  }

  player.vy += gravity;
  player.x += player.vx;
  player.y += player.vy;

  // 摩擦（壁接触）
  rocks.forEach(r=>{
    if(player.x>r.x && player.x<r.x+r.w && player.y>r.y && player.y<r.y+r.h){
      player.vx *= 0.5;
      player.vy *= 0.2;
    }
  });

  player.vx *= 0.99;
  player.vy *= 0.99;

  // 落下で大幅リセット
  if(player.y > cameraY + canvas.height + 200){
    player.y += 800;
    player.vy = 8;
    hook=null;
  }

  if(-player.y > maxY) maxY = -player.y;

  let targetY = player.y - canvas.height/2;
  cameraY = Math.min(targetY, 0);
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.save();
  ctx.translate(0,-cameraY);

  // 岩
  rocks.forEach(r=>{
    ctx.fillStyle="#3aa7ff";
    ctx.fillRect(r.x,r.y,r.w,r.h);
  });

  // プレイヤー
  ctx.fillStyle="#7FDBFF";
  ctx.beginPath(); ctx.arc(player.x,player.y,player.r,0,Math.PI*2); ctx.fill();

  // 棒
  ctx.strokeStyle="#ffffff";
  ctx.beginPath();
  ctx.moveTo(player.x,player.y);
  ctx.lineTo(mouse.x,mouse.y+cameraY);
  ctx.stroke();

  // フック表示
  if(hook){
    ctx.fillStyle="#ff0";
    ctx.beginPath(); ctx.arc(hook.x,hook.y,5,0,Math.PI*2); ctx.fill();
  }

  ctx.restore();

  ctx.fillStyle="#fff";
  ctx.fillText("高さ: "+Math.floor(maxY),20,30);
}

function loop(){ update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
