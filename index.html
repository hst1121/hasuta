<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>UNDERTALE Clone - Professional Version</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        #game-container { width: 640px; height: 480px; border: 4px solid #fff; position: relative; background: #000; box-sizing: border-box; cursor: crosshair; }
        #enemy-area { height: 160px; display: flex; flex-direction: column; justify-content: center; align-items: center; padding-top: 20px; }
        #enemy-sprite { width: 80px; height: 80px; background: #fff; transition: background 0.1s; border-radius: 4px; }
        #enemy-hp { width: 120px; height: 12px; border: 2px solid #fff; margin-top: 15px; background: #555; }
        #enemy-hp-fill { width: 100%; height: 100%; background: #0f0; transition: width 0.3s; }
        #battle-screen { height: 180px; position: relative; display: flex; justify-content: center; align-items: center; }
        canvas { border: 5px solid #fff; background: #000; }
        #message-box { position: absolute; width: 540px; height: 140px; background: #000; border: 5px solid #fff; padding: 20px; box-sizing: border-box; font-size: 22px; line-height: 1.4; pointer-events: none; z-index: 10; }
        #status-bar { height: 40px; font-size: 20px; padding: 0 50px; display: flex; align-items: center; }
        #command-menu { height: 70px; display: flex; justify-content: space-around; align-items: center; padding: 0 20px; }
        .btn { border: 3px solid #e27d3c; color: #e27d3c; padding: 5px 0; width: 130px; text-align: center; font-size: 20px; font-weight: bold; }
        .btn.selected { border-color: #fff; color: #fff; background: #e27d3c; }
        #game-over { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        #game-over h1 { color: #f00; font-size: 60px; margin-bottom: 20px; }
        .hint { position: absolute; top: 10px; width: 100%; text-align: center; color: #555; font-size: 12px; }
    </style>
</head>
<body onclick="window.focus();">

<div id="game-container">
    <div class="hint">操作できない時は画面をクリック！ (半角入力推奨)</div>
    
    <div id="enemy-area">
        <div id="enemy-sprite"></div>
        <div id="enemy-hp"><div id="enemy-hp-fill"></div></div>
    </div>

    <div id="battle-screen">
        <canvas id="gameCanvas" width="550" height="150"></canvas>
        <div id="message-box"></div>
    </div>

    <div id="status-bar">
        <span>PLAYER  LV 19</span>
        <span style="margin-left:30px;">HP <span id="hp-text">20 / 20</span></span>
    </div>

    <div id="command-menu">
        <div class="btn" id="btn-0">たたかう</div>
        <div class="btn" id="btn-1">こうどう</div>
        <div class="btn" id="btn-2">アイテム</div>
        <div class="btn" id="btn-3">のがす</div>
    </div>

    <div id="game-over">
        <h1>GAME OVER</h1>
        <p>ケツイを ちからに かえるんだ…</p>
        <button onclick="location.reload()" style="background:none; color:#fff; border:2px solid #fff; padding:10px 20px; cursor:pointer; font-family:inherit;">もういちど</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const msgBox = document.getElementById('message-box');
    const hpLabel = document.getElementById('hp-text');
    const enemySprite = document.getElementById('enemy-sprite');
    const enemyHpFill = document.getElementById('enemy-hp-fill');

    // --- ゲーム設定 ---
    let state = 'DIALOG'; // DIALOG, MENU, BATTLE, ATTACK, GAMEOVER
    let menuIdx = 0;
    let frame = 0;
    let timer = 0;
    let enemyHP = 100;
    let atkBarX = 0;
    let atkBarSpeed = 7;
    const player = { x: 275, y: 75, hp: 20, maxHp: 20, speed: 4 };
    let bullets = [];
    const keys = {};

    // --- キー入力処理 ---
    window.addEventListener('keydown', e => {
        if (e.repeat) return;
        keys[e.code] = true;
        
        // ブラウザのスクロール防止
        if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight","Space"].includes(e.code)) e.preventDefault();

        if (state === 'MENU') {
            if (e.code === 'ArrowLeft') menuIdx = (menuIdx + 3) % 4;
            if (e.code === 'ArrowRight') menuIdx = (menuIdx + 1) % 4;
            if (e.code === 'Enter' || e.code === 'KeyZ') selectMenu();
            updateMenuUI();
        } else if (state === 'ATTACK') {
            if (e.code === 'Enter' || e.code === 'KeyZ') executeAttack();
        }
    });
    window.addEventListener('keyup', e => keys[e.code] = false);

    function updateMenuUI() {
        document.querySelectorAll('.btn').forEach((b, i) => b.classList.toggle('selected', i === menuIdx));
    }

    function selectMenu() {
        if (menuIdx === 0) {
            state = 'ATTACK';
            atkBarX = 0;
            msgBox.style.display = 'none';
        } else if (menuIdx === 3) {
            showText("＊ 逃げられない！", () => { state = 'MENU'; });
        } else {
            startEnemyTurn();
        }
    }

    function executeAttack() {
        let center = canvas.width / 2;
        let diff = Math.abs(atkBarX - center);
        let dmg = Math.max(5, Math.floor(30 * (1 - diff / center)));
        
        enemyHP -= dmg;
        enemyHpFill.style.width = Math.max(0, enemyHP) + "%";
        enemySprite.style.background = "#f00";
        setTimeout(() => enemySprite.style.background = "#fff", 100);

        if (enemyHP <= 0) {
            showText("＊ 勝利！ 世界に 平和が 訪れた。", () => location.reload());
        } else {
            showText(`＊ ${dmg} ダメージを与えた！`, startEnemyTurn);
        }
    }

    function startEnemyTurn() {
        state = 'BATTLE';
        timer = 240; // 約4秒
        player.x = canvas.width / 2;
        player.y = canvas.height / 2;
        bullets = [];
        msgBox.style.display = 'none';
    }

    function showText(txt, callback) {
        state = 'DIALOG';
        msgBox.style.display = 'block';
        msgBox.innerText = "";
        let i = 0;
        const interval = setInterval(() => {
            msgBox.innerText += txt[i];
            i++;
            if (i >= txt.length) {
                clearInterval(interval);
                setTimeout(() => { if(callback) callback(); }, 800);
            }
        }, 40);
    }

    function update() {
        frame++;
        if (state === 'BATTLE') {
            timer--;
            if (timer <= 0) {
                state = 'MENU';
                showText("＊ 敵は じっと見つめている。");
            }
            // 移動
            if (keys['ArrowUp'] && player.y > 10) player.y -= player.speed;
            if (keys['ArrowDown'] && player.y < canvas.height - 10) player.y += player.speed;
            if (keys['ArrowLeft'] && player.x > 10) player.x -= player.speed;
            if (keys['ArrowRight'] && player.x < canvas.width - 10) player.x += player.speed;

            // 攻撃生成
            if (frame % 12 === 0) {
                bullets.push({ x: Math.random()*canvas.width, y: 0, vy: 4 });
            }

            bullets.forEach((b, i) => {
                b.y += b.vy;
                if (Math.hypot(player.x - b.x, player.y - b.y) < 12) {
                    player.hp = Math.max(0, player.hp - 0.2);
                    hpLabel.innerText = `${Math.ceil(player.hp)} / ${player.maxHp}`;
                    if (player.hp <= 0) {
                        state = 'GAMEOVER';
                        document.getElementById('game-over').style.display = 'flex';
                    }
                }
            });
            bullets = bullets.filter(b => b.y < canvas.height);
        } else if (state === 'ATTACK') {
            atkBarX += atkBarSpeed;
            if (atkBarX > canvas.width || atkBarX < 0) atkBarSpeed *= -1;
        }

        enemySprite.style.transform = `translateX(${Math.sin(frame * 0.1) * 10}px)`;
        draw();
        requestAnimationFrame(update);
    }

    function draw() {
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        if (state === 'BATTLE') {
            // ハート
            ctx.fillStyle = '#f00';
            ctx.beginPath();
            ctx.arc(player.x, player.y, 8, 0, Math.PI*2);
            ctx.fill();
            // 敵の弾
            ctx.fillStyle = '#fff';
            bullets.forEach(b => ctx.fillRect(b.x-5, b.y-5, 10, 10));
        } else if (state === 'ATTACK') {
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 4;
            ctx.strokeRect(20, 40, canvas.width-40, 70);
            ctx.fillStyle = '#fff';
            ctx.fillRect(atkBarX, 35, 10, 8
