<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>UNDERTALE Clone - Full Loop</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; user-select: none; }
        #game-container { width: 640px; height: 480px; border: 2px solid #fff; position: relative; display: flex; flex-direction: column; padding: 10px; }
        #enemy-area { height: 160px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #enemy-sprite { width: 80px; height: 80px; background: #fff; transition: background 0.1s; }
        #enemy-hp-bar { width: 100px; height: 10px; border: 1px solid #fff; margin-top: 10px; position: relative; }
        #enemy-hp-fill { width: 100%; height: 100%; background: #0f0; transition: width 0.3s; }
        #battle-screen { flex-grow: 1; position: relative; display: flex; justify-content: center; align-items: center; }
        canvas { border: 5px solid #fff; background: #000; }
        #message-box { position: absolute; width: 540px; height: 140px; background: #000; padding: 20px; box-sizing: border-box; font-size: 20px; line-height: 1.6; display: none; border: 4px solid #fff; }
        #command-menu { height: 60px; display: flex; justify-content: space-around; align-items: center; }
        .btn { border: 2px solid #e27d3c; color: #e27d3c; padding: 5px 10px; font-size: 20px; width: 120px; text-align: center; }
        .btn.selected { border-color: #fff; color: #fff; background: #e27d3c; }
        #status-bar { height: 30px; font-size: 18px; padding-left: 50px; color: #fff; }
        #game-over { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        #game-over h1 { color: #f00; font-size: 48px; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="enemy-area">
        <div id="enemy-sprite"></div>
        <div id="enemy-hp-bar"><div id="enemy-hp-fill"></div></div>
    </div>
    <div id="battle-screen">
        <canvas id="gameCanvas" width="560" height="160"></canvas>
        <div id="message-box"></div>
    </div>
    <div id="status-bar">PLAYER LV 1 HP <span id="hp-text">20 / 20</span></div>
    <div id="command-menu">
        <div class="btn" id="btn-0">たたかう</div>
        <div class="btn" id="btn-1">こうどう</div>
        <div class="btn" id="btn-2">アイテム</div>
        <div class="btn" id="btn-3">のがす</div>
    </div>
    <div id="game-over">
        <h1>GAME OVER</h1>
        <p>あきらめてはいけない！</p>
        <button onclick="location.reload()" style="padding: 10px 20px; cursor: pointer;">もういちど</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const msgBox = document.getElementById('message-box');
    const hpText = document.getElementById('hp-text');
    const enemySprite = document.getElementById('enemy-sprite');
    const enemyHpFill = document.getElementById('enemy-hp-fill');

    let gameState = 'MENU'; // MENU, DIALOG, BATTLE, ATTACK_ACTION, GAMEOVER
    let menuIndex = 0;
    let frame = 0;
    let turnTimer = 0;
    let attackBarPos = 0;
    let attackBarDir = 1;
    let enemyHP = 100;
    const player = { x: 280, y: 80, size: 12, speed: 4, hp: 20, maxHp: 20 };
    let bullets = [];
    const keys = {};

    window.addEventListener('keydown', e => { keys[e.code] = true; handleInput(e.code); });
    window.addEventListener('keyup', e => keys[e.code] = false);

    function handleInput(code) {
        if (gameState === 'MENU') {
            if (code === 'ArrowLeft') menuIndex = (menuIndex + 3) % 4;
            if (code === 'ArrowRight') menuIndex = (menuIndex + 1) % 4;
            if (code === 'Enter' || code === 'KeyZ') {
                if (menuIndex === 0) startAttackAction();
                else if (menuIndex === 3) showDialog("＊ しかし 逃げられない！", () => { gameState = 'MENU'; });
                else startBattle();
            }
            updateMenuUI();
        } else if (gameState === 'ATTACK_ACTION') {
            if (code === 'Enter' || code === 'KeyZ') finishAttackAction();
        }
    }

    function updateMenuUI() {
        document.querySelectorAll('.btn').forEach((btn, i) => btn.classList.toggle('selected', i === menuIndex));
    }

    // --- 攻撃アクション (たたかう) ---
    function startAttackAction() {
        gameState = 'ATTACK_ACTION';
        msgBox.style.display = 'none';
        attackBarPos = 0;
    }

    function finishAttackAction() {
        let dist = Math.abs(attackBarPos - (canvas.width / 2));
        let damage = Math.max(0, Math.floor(20 * (1 - dist / (canvas.width / 2))));
        enemyHP -= damage;
        enemyHpFill.style.width = enemyHP + "%";
        
        // 敵へのダメージ演出
        enemySprite.style.background = "#f00";
        setTimeout(() => { enemySprite.style.background = "#fff"; }, 100);

        if (enemyHP <= 0) {
            showDialog("＊ 勝利！ あなたは 経験値を得なかった。", () => location.reload());
        } else {
            showDialog(`＊ ${damage} ダメージをあたえた！`, () => { startBattle(); });
        }
    }

    // --- 敵のターン (回避) ---
    function startBattle() {
        gameState = 'BATTLE';
        msgBox.style.display = 'none';
        turnTimer = 240; // 4秒
        player.x = canvas.width / 2;
        player.y = canvas.height / 2;
        bullets = [];
    }

    function update() {
        frame++;
        if (gameState === 'BATTLE') {
            turnTimer--;
            if (turnTimer <= 0) { gameState = 'MENU'; showDialog("＊ 敵は笑っている。"); }
            if (keys['ArrowUp'] && player.y > 10) player.y -= player.speed;
            if (keys['ArrowDown'] && player.y < canvas.height - 10) player.y += player.speed;
            if (keys['ArrowLeft'] && player.x > 10) player.x -= player.speed;
            if (keys['ArrowRight'] && player.x < canvas.width - 10) player.x += player.speed;
            
            // 弾幕生成
            if (frame % 10 === 0) bullets.push({ x: Math.random()*canvas.width, y: 0, vy: 4 });
            
            bullets.forEach((b, i) => {
                b.y += b.vy;
                let dx = player.x - b.x, dy = player.y - b.y;
                if (Math.sqrt(dx*dx + dy*dy) < 10) {
                    player.hp = Math.max(0, player.hp - 0.2);
                    hpText.innerText = `${Math.ceil(player.hp)} / ${player.maxHp}`;
                    if (player.hp <= 0) { gameState = 'GAMEOVER'; document.getElementById('game-over').style.display = 'flex'; }
                }
            });
        } else if (gameState === 'ATTACK_ACTION') {
            attackBarPos += 8 * attackBarDir;
            if (attackBarPos > canvas.width || attackBarPos < 0) attackBarDir *= -1;
        }

        enemySprite.style.transform = `translateX(${Math.sin(frame * 0.1) * 10}px)`;
        draw();
        requestAnimationFrame(update);
    }

    function draw() {
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        if (gameState === 'BATTLE') {
            ctx.fillStyle = '#f00'; // ソウル
            ctx.fillRect(player.x-6, player.y-6, 12, 12);
            ctx.fillStyle = '#fff';
            bullets.forEach(b => ctx.fillRect(b.x-4, b.y-4, 8, 8));
        } else if (gameState === 'ATTACK_ACTION') {
            ctx.strokeStyle = '#444'; ctx.lineWidth = 10;
            ctx.strokeRect(50, 40, canvas.width-100, 80);
            ctx.fillStyle = '#fff'; // ターゲットバー
            ctx.fillRect(attackBarPos, 30, 10, 100);
            ctx.fillStyle = 'rgba(0, 255, 255, 0.3)';
            ctx.fillRect(canvas.width/2 - 20, 40, 40, 80); // ヒットゾーン
        }
    }

    function showDialog(text, callback) {
        gameState = 'DIALOG';
        msgBox.style.display = 'block';
        msgBox.innerText = "";
        let i = 0;
        const interval = setInterval(() => {
            msgBox.innerText += text[i];
            i++;
            if (i >= text.length) {
                clearInterval(interval);
                setTimeout(() => { if(callback) callback(); }, 1000);
            }
        }, 30);
    }

    updateMenuUI();
    showDialog("＊ モンスターが現れた！");
    update();
</script>
</body>
</html>
