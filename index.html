<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Undertale風 分岐版</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: monospace;
  overflow: hidden;
}

#game {
  width: 640px;
  height: 420px;
  margin: 40px auto;
  border: 4px solid white;
  position: relative;
}

#player {
  width: 18px;
  height: 18px;
  background: red;
  position: absolute;
  transform: rotate(45deg);
}

.bullet {
  width: 10px;
  height: 10px;
  background: white;
  position: absolute;
  border-radius: 50%;
}

#text {
  text-align: center;
  margin-top: 10px;
}
</style>
</head>

<body>

<div id="game">
  <div id="player"></div>
</div>

<div id="text"></div>

<script>
const game=document.getElementById("game");
const player=document.getElementById("player");
const text=document.getElementById("text");

let px=300,py=200;
let vx=0,vy=0;
let hp=100,inv=0,time=0;

let bullets=[];
let keys={};

/* 分岐用 */
let hits=0;
let moveTime=0;

document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

/* 弾 */
function spawn(x,y,vx,vy){
  let el=document.createElement("div");
  el.className="bullet";
  game.appendChild(el);
  bullets.push({x,y,vx,vy,el});
}

/* 攻撃 */
function attack(){
  for(let i=0;i<12;i++){
    let a=i*Math.PI/6;
    spawn(320,210,Math.cos(a)*2,Math.sin(a)*2);
  }
}

/* ループ */
function loop(){
  time++;

  /* 移動 */
  if(keys["ArrowUp"]||keys["ArrowDown"]||keys["ArrowLeft"]||keys["ArrowRight"]){
    moveTime++;
  }

  if(keys["ArrowUp"]) vy-=0.4;
  if(keys["ArrowDown"]) vy+=0.4;
  if(keys["ArrowLeft"]) vx-=0.4;
  if(keys["ArrowRight"]) vx+=0.4;

  vx*=0.9; vy*=0.9;
  px+=vx; py+=vy;

  px=Math.max(0,Math.min(620,px));
  py=Math.max(0,Math.min(400,py));

  player.style.left=px+"px";
  player.style.top=py+"px";

  /* 弾 */
  bullets.forEach(b=>{
    b.x+=b.vx;
    b.y+=b.vy;
    b.el.style.left=b.x+"px";
    b.el.style.top=b.y+"px";

    if(inv<=0 &&
      b.x<px+18 && b.x+10>px &&
      b.y<py+18 && b.y+10>py){
      hp-=2;
      hits++;
      inv=20;
    }
  });

  if(inv>0){
    inv--;
    player.style.opacity=(inv%4<2)?0.3:1;
  }

  /* 攻撃 */
  if(time%80===0) attack();

  /* 終了 */
  if(hp<=0 || time>2000){
    ending();
    return;
  }

  requestAnimationFrame(loop);
}

/* エンディング分岐 */
function ending(){
  let result="";

  if(hits>30){
    result="😨 弱さエンド\nまだ早かったね";
  }
  else if(moveTime<200){
    result="👁 観察エンド\n気づいたね？";
  }
  else{
    result="💪 決意エンド\n君は残る資格がある";
  }

  text.innerText=result;
}

loop();
</script>

</body>
</html>
