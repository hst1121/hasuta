<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>UNO CSSリアル版</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle, #1b5e20, #0d3b1e);
  overflow: hidden;
  font-family: sans-serif;
}

/* テーブル */
#table {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

/* カード */
.card {
  width: 90px;
  height: 140px;
  border-radius: 14px;
  position: absolute;
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.4s ease;
  box-shadow: 0 8px 16px rgba(0,0,0,0.7);
  overflow: hidden;
}

/* 背景色 */
.red { background: #d32f2f; }
.blue { background: #1976d2; }
.green { background: #388e3c; }
.yellow { background: #fbc02d; color:black; }

/* UNOっぽい楕円 */
.card::before {
  content: "";
  position: absolute;
  width: 140%;
  height: 80%;
  background: white;
  border-radius: 50%;
  top: 10%;
  left: -20%;
  transform: rotate(-25deg);
}

/* 中央数字 */
.center {
  position: absolute;
  font-size: 42px;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) rotate(-10deg);
}

/* 角数字 */
.corner {
  position: absolute;
  font-size: 16px;
}
.top-left { top: 6px; left: 8px; }
.bottom-right { bottom: 6px; right: 8px; transform: rotate(180deg); }

/* ワイルド */
.wild {
  background: linear-gradient(45deg, red, yellow, green, blue);
  color: white;
}

/* 中央カード */
#centerCard {
  position: relative;
  transform: scale(1.5);
}

/* 手札 */
#playerHand {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
}

/* 山札 */
#deck {
  position: absolute;
  left: 35%;
  top: 50%;
  width: 90px;
  height: 140px;
  background: black;
  border-radius: 14px;
  border: 3px solid white;
}

/* ホバー */
.card:hover {
  transform: translateY(-20px) scale(1.1);
  z-index: 10;
}

/* CPU */
.cpu {
  position: absolute;
  color: white;
}
#cpu1 { top: 20px; left: 50%; transform: translateX(-50%); }
#cpu2 { left: 20px; top: 50%; }
#cpu3 { right: 20px; top: 50%; }

</style>
</head>

<body>

<div id="deck"></div>
<div id="table"><div id="centerCard"></div></div>

<div id="playerHand"></div>

<div id="cpu1" class="cpu"></div>
<div id="cpu2" class="cpu"></div>
<div id="cpu3" class="cpu"></div>

<script>
const colors=["red","blue","green","yellow"];
let deck=[],players=[[],[],[],[]];
let topCard,current=0;

/* デッキ */
function createDeck(){
  deck=[];
  colors.forEach(c=>{
    for(let i=0;i<=9;i++){
      deck.push({c,v:i});
      if(i!==0) deck.push({c,v:i});
    }
  });
  shuffle(deck);
}

function shuffle(a){
  for(let i=a.length-1;i>0;i--){
    let j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
}

function deal(){
  for(let i=0;i<4;i++){
    players[i]=[];
    for(let j=0;j<7;j++) players[i].push(deck.pop());
  }
  topCard=deck.pop();
}

/* カード生成 */
function makeCard(c){
  let el=document.createElement("div");
  el.className="card "+c.c;

  el.innerHTML=`
    <div class="corner top-left">${c.v}</div>
    <div class="center">${c.v}</div>
    <div class="corner bottom-right">${c.v}</div>
  `;
  return el;
}

/* 描画 */
function render(){
  let center=document.getElementById("centerCard");
  center.innerHTML="";
  center.appendChild(makeCard(topCard));

  renderHand();
  for(let i=1;i<=3;i++){
    document.getElementById("cpu"+i).innerText=
      "CPU"+i+" ("+players[i].length+")";
  }
}

/* 手札（扇） */
function renderHand(){
  let hand=document.getElementById("playerHand");
  hand.innerHTML="";

  let spread=35;
  players[0].forEach((c,i)=>{
    let el=makeCard(c);

    let offset=i-(players[0].length/2);
    el.style.left=(offset*spread+300)+"px";
    el.style.transform=`rotate(${offset*6}deg)`;

    el.onclick=()=>play(i,el);
    hand.appendChild(el);
  });
}

/* 出せる */
function canPlay(c){
  return c.c===topCard.c || c.v===topCard.v;
}

/* プレイ（アニメーション） */
function play(i,el){
  if(current!==0) return;
  let c=players[0][i];
  if(!canPlay(c)) return;

  let rect=el.getBoundingClientRect();
  let clone=el.cloneNode(true);
  document.body.appendChild(clone);

  clone.style.left=rect.left+"px";
  clone.style.top=rect.top+"px";

  setTimeout(()=>{
    clone.style.left="55%";
    clone.style.top="45%";
    clone.style.transform="rotate(0deg)";
  },10);

  setTimeout(()=>{
    clone.remove();
    topCard=c;
    players[0].splice(i,1);
    next();
  },400);
}

/* ドロー演出 */
function drawCard(i){
  let c=deck.pop();
  players[i].push(c);

  let deckEl=document.getElementById("deck");
  let rect=deckEl.getBoundingClientRect();

  let el=makeCard(c);
  document.body.appendChild(el);

  el.style.left=rect.left+"px";
  el.style.top=rect.top+"px";

  setTimeout(()=>{
    el.style.left="50%";
    el.style.top="80%";
  },10);

  setTimeout(()=>el.remove(),400);
}

/* CPU */
function cpu(i){
  let idx=players[i].findIndex(canPlay);
  if(idx>=0){
    topCard=players[i][idx];
    players[i].splice(idx,1);
  }else{
    drawCard(i);
  }
}

/* ターン */
function next(){
  current=(current+1)%4;

  setTimeout(()=>{
    if(current!==0){
      cpu(current);
      render();
      next();
    }else{
      render();
    }
  },600);
}

createDeck();
deal();
render();
</script>

</body>
</html>
