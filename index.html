<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>UNDERTALE Clone - Fixed Message System</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        #game-container { width: 640px; height: 480px; border: 4px solid #fff; position: relative; background: #000; }
        
        /* 敵エリア */
        #enemy-area { height: 180px; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; }
        #enemy-sprite { width: 80px; height: 80px; background: #fff; border-radius: 5px; transition: transform 0.1s; }
        #enemy-hp-container { width: 150px; height: 10px; border: 2px solid #fff; margin-top: 10px; background: #555; }
        #enemy-hp-fill { width: 100%; height: 100%; background: #0f0; transition: width 0.2s; }
        #damage-popup { position: absolute; color: #f00; font-size: 24px; font-weight: bold; display: none; top: 40px; }

        /* メイン画面 */
        #battle-screen { height: 160px; position: relative; display: flex; justify-content: center; align-items: center; }
        canvas { border: 5px solid #fff; background: #000; }
        
        /* 修正したメッセージボックス */
        #msg-box { 
            position: absolute; width: 540px; height: 140px; background: #000; border: 5px solid #fff; 
            padding: 20px; box-sizing: border-box; font-size: 24px; line-height: 1.4; 
            z-index: 100; display: block; word-break: break-all;
        }

        #status-bar { height: 40px; font-size: 20px; padding: 0 50px; display: flex; align-items: center; color: #fff; }
        #command-menu { height: 60px; display: flex; justify-content: space-around; align-items: center; }
        .btn { border: 3px solid #e27d3c; color: #e27d3c; padding: 5px 20px; font-size: 20px; font-weight: bold; cursor: pointer; }
        .btn.selected { border-color: #fff; color: #fff; background: #e27d3c; }
    </style>
</head>
<body onclick="window.focus();">

<div id="game-container">
    <div id="enemy-area">
        <div id="damage-popup">0</div>
        <div id="enemy-sprite"></div>
        <div id="enemy-hp-container"><div id="enemy-hp-fill"></div></div>
    </div>
    <div id="battle-screen">
        <canvas id="gameCanvas" width="550" height="150"></canvas>
        <div id="msg-box"></div>
    </div>
    <div id="status-bar">PLAYER HP <span id="hp-text">20 / 20</span></div>
    <div id="command-menu">
        <div class="btn" id="btn-0">たたかう</div>
        <div class="btn" id="btn-1">こうどう</div>
        <div class="btn" id="btn-2">アイテム</div>
        <div class="btn" id="btn-3">のがす</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const msgBox = document.getElementById('msg-box');
    const hpLabel = document.getElementById('hp-text');
    const enemyHpFill = document.getElementById('enemy-hp-fill');
    const dmgPopup = document.getElementById('damage-popup');
    const enemySprite = document.getElementById('enemy-sprite');

    let state = 'INIT'; // MENU, DIALOG, BATTLE, ATTACK_GAUGE, ANIMATING
    let menuIdx = 0;
    let frame = 0;
    let enemyHP = 100;
    let atkBarX = 0;
    let atkBarSpeed = 9;
    let turnTimer = 0;
    let nextCallback = null;
    
    const player = { x: 275, y: 75, hp: 20, maxHp: 20, speed: 4 };
    let bullets = [];
    const keys = {};

    window.addEventListener('keydown', e => { 
        keys[e.code] = true; 
        
        // メッセージ表示中に決定キーで次へ
        if (state === 'DIALOG' && (e.code === 'Enter' || e.code === 'KeyZ')) {
            if (nextCallback) {
                const cb = nextCallback;
                nextCallback = null;
                cb();
            }
        } else {
            handleInput(e.code);
        }
    });
    window.addEventListener('keyup', e => keys[e.code] = false);

    function handleInput(code) {
        if (state === 'MENU') {
            if (code === 'ArrowLeft') menuIdx = (menuIdx + 3) % 4;
            if (code === 'ArrowRight') menuIdx = (menuIdx + 1) % 4;
            if (code === 'Enter' || code === 'KeyZ') selectMenu();
            updateMenuUI();
        } else if (state === 'ATTACK_GAUGE') {
            if (code === 'Enter' || code === 'KeyZ') executeAttack();
        }
    }

    function updateMenuUI() {
        document.querySelectorAll('.btn').forEach((b, i) => b.classList.toggle('selected', i === menuIdx));
    }

    // 修正版タイピング関数
    function showText(txt, callback) {
        state = 'DIALOG';
        msgBox.style.display = 'block';
        msgBox.innerText = "";
        nextCallback = callback;
        
        let i = 0;
        const typing = setInterval(() => {
            if (i < txt.length) {
                msgBox.innerText += txt[i];
                i++;
            } else {
                clearInterval(typing);
                // 文字が出終わったら「▼」を表示（雰囲気用）
                msgBox.innerText += " ▼";
            }
        }, 40);
    }

    function selectMenu() {
        if (menuIdx === 0) {
            state = 'ATTACK_GAUGE';
            atkBarX = 0;
            msgBox.style.display = 'none';
        } else {
            showText("＊ 逃げられない！", () => { state = 'MENU'; });
        }
    }

    function executeAttack() {
        state = 'ANIMATING';
        let center = canvas.width / 2;
        let diff = Math.abs(atkBarX - center);
        let dmg = Math.max(0, Math.floor(45 * (1 - diff / center)));
        
        enemyHP -= dmg;
        enemyHpFill.style.width = Math.max(0, enemyHP) + "%";
        
        // 敵の揺れ演出
        enemySprite.style.transform = "translateX(10px)";
        setTimeout(()=>enemySprite.style.transform = "translateX(-10px)", 50);
        setTimeout(()=>enemySprite.style.transform = "none", 100);

        dmgPopup.innerText = dmg > 0 ? dmg : "MISS";
        dmgPopup.style.display = 'block';
        
        setTimeout(() => {
            dmgPopup.style.display = 'none';
            if (enemyHP <= 0) {
                showText("＊ おめでとう！勝利だ！", () => location.reload());
            } else {
                startEnemyTurn();
            }
        }, 1000);
    }

    function startEnemyTurn() {
        state = 'BATTLE';
        turnTimer = 300;
        bullets = [];
        msgBox.style.display = 'none';
    }

    function update() {
        frame++;
        if (state === 'BATTLE') {
            turnTimer--;
            if (turnTimer <= 0) {
                showText("＊ 敵はあなたの出方を伺っている。", () => { state = 'MENU'; });
            }

            if (keys['ArrowUp'] && player.y > 10) player.y -= player.speed;
            if (keys['ArrowDown'] && player.y < canvas.height - 10) player.y += player.speed;
            if (keys['ArrowLeft'] && player.x > 10) player.x -= player.speed;
            if (keys['ArrowRight'] && player.x < canvas.width - 10) player.x += player.speed;

            // 弾幕（回転弾パターンを強化）
            if (frame % 5 === 0) {
                let angle = frame * 0.15;
                bullets.push({ x: canvas.width/2, y: canvas.height/2, vx: Math.cos(angle)*4, vy: Math.sin(angle)*4 });
            }

            bullets.forEach((b, i) => {
                b.x += b.vx; b.y += b.vy;
                if (Math.hypot(player.x - b.x, player.y - b.y) < 10) {
                    player.hp = Math.max(0, player.hp - 0.2);
                    hpLabel.innerText = `${Math.ceil(player.hp)} / 20`;
                }
            });
            bullets = bullets.filter(b => b.y < 200 && b.y > -50 && b.x > -50 && b.x < 600);
        } else if (state === 'ATTACK_GAUGE') {
            atkBarX += atkBarSpeed;
            if (atkBarX > canvas.width || atkBarX < 0) atkBarSpeed *= -1;
        }
        draw();
        requestAnimationFrame(update);
    }

    function draw() {
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        if (state === 'BATTLE') {
            ctx.fillStyle = 'red';
            ctx.beginPath(); ctx.arc(player.x, player.y, 8, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = 'white';
            bullets.forEach(b => ctx.fillRect(b.x-4, b.y-4, 8, 8));
        } else if (state === 'ATTACK_GAUGE') {
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 4;
            ctx.strokeRect(50, 40, canvas.width-100, 70);
            ctx.fillStyle = '#fff';
            ctx.fillRect(atkBarX, 35, 10, 80);
        }
    }

    updateMenuUI();
    showText("＊ 容赦のない モンスターが 現れた！", () => { state = 'MENU'; });
    update();
</script>
</body>
</html>
