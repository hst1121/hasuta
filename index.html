<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>UNDERTALE Clone - Battle System</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        #game-container { width: 640px; height: 480px; border: 4px solid #fff; position: relative; background: #000; box-sizing: border-box; }
        
        /* 敵エリア */
        #enemy-area { height: 180px; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; }
        #enemy-sprite { width: 100px; height: 100px; background: #fff; border-radius: 10px; }
        #enemy-hp-container { width: 150px; height: 12px; border: 2px solid #fff; margin-top: 15px; background: #555; }
        #enemy-hp-fill { width: 100%; height: 100%; background: #0f0; transition: width 0.3s; }
        #damage-popup { position: absolute; color: #f00; font-size: 30px; font-weight: bold; display: none; z-index: 20; }

        /* メイン画面 */
        #battle-screen { height: 160px; position: relative; display: flex; justify-content: center; align-items: center; }
        canvas { border: 5px solid #fff; background: #000; }
        #msg-box { position: absolute; width: 540px; height: 140px; background: #000; border: 5px solid #fff; padding: 20px; box-sizing: border-box; font-size: 22px; line-height: 1.4; pointer-events: none; z-index: 10; }

        /* ステータス & ボタン */
        #status-bar { height: 40px; font-size: 20px; padding: 0 50px; display: flex; align-items: center; }
        #command-menu { height: 70px; display: flex; justify-content: space-around; align-items: center; padding: 0 20px; }
        .btn { border: 3px solid #e27d3c; color: #e27d3c; padding: 5px 0; width: 130px; text-align: center; font-size: 20px; font-weight: bold; cursor: pointer; }
        .btn.selected { border-color: #fff; color: #fff; background: #e27d3c; }

        /* フラッシュ演出 */
        #flash { position: absolute; top:0; left:0; width:100%; height:100%; background:#fff; opacity:0; pointer-events:none; z-index:50; }
    </style>
</head>
<body onclick="window.focus();">

<div id="game-container">
    <div id="flash"></div>
    <div id="enemy-area">
        <div id="damage-popup">MISS</div>
        <div id="enemy-sprite"></div>
        <div id="enemy-hp-container"><div id="enemy-hp-fill"></div></div>
    </div>

    <div id="battle-screen">
        <canvas id="gameCanvas" width="550" height="150"></canvas>
        <div id="msg-box"></div>
    </div>

    <div id="status-bar">
        <span>PLAYER LV 19</span>
        <span style="margin-left:30px;">HP <span id="hp-text">20 / 20</span></span>
    </div>

    <div id="command-menu">
        <div class="btn" id="btn-0" onclick="handleInput('Enter')">たたかう</div>
        <div class="btn" id="btn-1" onclick="menuIdx=1;selectMenu()">こうどう</div>
        <div class="btn" id="btn-2" onclick="menuIdx=2;selectMenu()">アイテム</div>
        <div class="btn" id="btn-3" onclick="menuIdx=3;selectMenu()">のがす</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const msgBox = document.getElementById('msg-box');
    const hpLabel = document.getElementById('hp-text');
    const enemySprite = document.getElementById('enemy-sprite');
    const enemyHpFill = document.getElementById('enemy-hp-fill');
    const dmgPopup = document.getElementById('damage-popup');
    const flash = document.getElementById('flash');

    let state = 'DIALOG'; // DIALOG, MENU, BATTLE, ATTACK_GAUGE
    let menuIdx = 0;
    let frame = 0;
    let enemyHP = 100;
    let atkBarX = 0;
    let atkBarSpeed = 8;
    const player = { x: 275, y: 75, hp: 20, maxHp: 20, speed: 4 };
    let bullets = [];
    const keys = {};

    window.addEventListener('keydown', e => {
        keys[e.code] = true;
        handleInput(e.code);
    });
    window.addEventListener('keyup', e => keys[e.code] = false);

    function handleInput(code) {
        if (state === 'MENU') {
            if (code === 'ArrowLeft') menuIdx = (menuIdx + 3) % 4;
            if (code === 'ArrowRight') menuIdx = (menuIdx + 1) % 4;
            if (code === 'Enter' || code === 'KeyZ') selectMenu();
            updateMenuUI();
        } else if (state === 'ATTACK_GAUGE') {
            if (code === 'Enter' || code === 'KeyZ') executeAttack();
        }
    }

    function updateMenuUI() {
        document.querySelectorAll('.btn').forEach((b, i) => b.classList.toggle('selected', i === menuIdx));
    }

    function selectMenu() {
        if (menuIdx === 0) {
            state = 'ATTACK_GAUGE';
            atkBarX = 0;
            msgBox.style.display = 'none';
        } else {
            showText("＊ しかし なにも おきなかった！", startEnemyTurn);
        }
    }

    // --- 攻撃アクション（ゲージ） ---
    function executeAttack() {
        state = 'ANIMATING';
        let center = canvas.width / 2;
        let diff = Math.abs(atkBarX - center);
        let dmg = Math.max(0, Math.floor(40 * (1 - diff / (canvas.width/2))));
        
        // フラッシュ演出
        flash.style.opacity = '0.5';
        setTimeout(() => flash.style.opacity = '0', 50);

        // ダメージ表示
        if (dmg > 0) {
            enemyHP -= dmg;
            enemyHpFill.style.width = Math.max(0, enemyHP) + "%";
            dmgPopup.innerText = dmg;
            dmgPopup.style.color = "#f00";
            
            // 敵が震える
            let shake = 0;
            let shakeInterval = setInterval(() => {
                enemySprite.style.transform = `translateX(${(Math.random()-0.5)*20}px)`;
                shake++;
                if(shake > 10) {
                    clearInterval(shakeInterval);
                    enemySprite.style.transform = "none";
                }
            }, 30);
        } else {
            dmgPopup.innerText = "MISS";
            dmgPopup.style.color = "#aaa";
        }

        dmgPopup.style.display = 'block';
        setTimeout(() => {
            dmgPopup.style.display = 'none';
            if (enemyHP <= 0) {
                enemySprite.style.opacity = "0.3";
                showText("＊ 勝利！ あなたの LV が上がった。（嘘）", () => location.reload());
            } else {
                startEnemyTurn();
            }
        }, 1000);
    }

    function startEnemyTurn() {
        state = 'BATTLE';
        timer = 200;
        player.x = canvas.width / 2;
        player.y = canvas.height / 2;
        bullets = [];
        msgBox.style.display = 'none';
    }

    function showText(txt, callback) {
        state = 'DIALOG';
        msgBox.style.display = 'block';
        msgBox.innerText = "";
        let i = 0;
        const interval = setInterval(() => {
            msgBox.innerText += txt[i];
            i++;
            if (i >= text.length) {
                clearInterval(interval);
                setTimeout(() => { if(callback) callback(); }, 1000);
            }
        }, 30);
        // 簡易版テキスト送り
        msgBox.innerText = txt;
        setTimeout(() => { if(callback) callback(); }, 1500);
    }

    function update() {
        frame++;
        if (state === 'BATTLE') {
            // 回避フェーズの移動
            if (keys['ArrowUp'] && player.y > 10) player.y -= player.speed;
            if (keys['ArrowDown'] && player.y < canvas.height - 10) player.y += player.speed;
            if (keys['ArrowLeft'] && player.x > 10) player.x -= player.speed;
            if (keys['ArrowRight'] && player.x < canvas.width - 10) player.x += player.speed;

            if (frame % 15 === 0) bullets.push({ x: Math.random()*canvas.width, y: 0, vy: 4 });
            bullets.forEach((b, i) => {
                b.y += b.vy;
                if (Math.hypot(player.x - b.x, player.y - b.y) < 12) {
                    player.hp = Math.max(0, player.hp - 0.1);
                    hpLabel.innerText = `${Math.ceil(player.hp)} / 20`;
                }
            });
            if (frame % 250 === 0) { state = 'MENU'; showText("＊ 敵は じっと耐えている。", () => state = 'MENU'); }
        } else if (state === 'ATTACK_GAUGE') {
            atkBarX += atkBarSpeed;
            if (atkBarX > canvas.width || atkBarX < 0) atkBarSpeed *= -1;
        }

        draw();
        requestAnimationFrame(update);
    }

    function draw() {
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        if (state === 'BATTLE') {
            ctx.fillStyle = '#f00';
            ctx.beginPath(); ctx.arc(player.x, player.y, 8, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#fff';
            bullets.forEach(b => ctx.fillRect(b.x-5, b.y-5, 10, 10));
        } else if (state === 'ATTACK_GAUGE') {
            // ターゲットゲージ枠
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 4;
            ctx.strokeRect(50, 40, canvas.width-100, 70);
            // 中心線
            ctx.strokeStyle = '#555';
            ctx.beginPath(); ctx.moveTo(canvas.width/2, 40); ctx.lineTo(canvas.width/2, 110); ctx.stroke();
            // 動くバー
            ctx.fillStyle = '#fff';
            ctx.fillRect(atkBarX, 35, 12, 80);
            ctx.shadowBlur = 10; ctx.shadowColor = "#fff";
        }
    }

    updateMenuUI();
    showText("＊ モンスターがあらわれた！", () => state = 'MENU');
    update();
</script>
</body>
</html>
