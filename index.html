<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>はすたの発狂クライミング</title>
<style>
  body { margin:0; overflow:hidden; background:#0b1e2d; }
  canvas { display:block; margin:0 auto; background:#06131d; }
  #controls { position:absolute; bottom:10px; left:50%; transform:translateX(-50%); color:#cfe9ff; font-size:12px; opacity:0.85; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="controls">← →：移動 / 足場に当たるとジャンプ / 落ちると大きく後退</div>
<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// 画面サイズにフィット
function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

let player, platforms, cameraY, maxHeight, keys;

function init(){
  player = { x:canvas.width/2, y:canvas.height-100, vx:0, vy:0, r:12 };
  cameraY = 0;
  maxHeight = 0;
  keys = {};

  platforms = [];

  // スタート足場（必ずいる）
  platforms.push({ x:canvas.width/2 - 60, y:canvas.height - 50, w:120, h:12 });

  // 上に生成（必ず届く距離に調整）
  let lastX = canvas.width/2 - 60;
  let lastY = canvas.height - 50;

  for(let i=1;i<120;i++){
    let dx = (Math.random() - 0.5) * 120; // 横ズレ制限
    let dy = 70 + Math.random()*20; // 縦間隔（ジャンプ可能範囲）

    let newX = Math.min(Math.max(lastX + dx, 0), canvas.width - 100);
    let newY = lastY - dy;

    platforms.push({
      x:newX,
      y:newY,
      w:90,
      h:10
    });

    lastX = newX;
    lastY = newY;
  });
  }
}
init();

let gravity = 0.4;

document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

function update(){
  if(keys["ArrowLeft"]) player.vx -= 0.6;
  if(keys["ArrowRight"]) player.vx += 0.6;

  player.vy += gravity;
  player.x += player.vx;
  player.y += player.vy;

  player.vx *= 0.92;

  // 足場判定
  platforms.forEach(p=>{
    if(player.x > p.x && player.x < p.x+p.w &&
       player.y+player.r > p.y && player.y+player.r < p.y+12 &&
       player.vy > 0){
      player.vy = -10;
    }
  });

  // 高さ
  if(-player.y > maxHeight) maxHeight = -player.y;

  // カメラ（下は見切れないよう制限）
  let targetY = player.y - canvas.height/2;
  cameraY = Math.min(targetY, 0);

  // 落下ペナルティ
  if(player.y > cameraY + canvas.height + 100){
    player.y += 400;
    player.vy = 6;
  }
}

function drawPlayer(x,y){
  ctx.fillStyle = "#7FDBFF";
  ctx.beginPath(); ctx.arc(x,y,player.r,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = "#001f3f";
  ctx.fillRect(x-4,y-2,3,3);
  ctx.fillRect(x+1,y-2,3,3);
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.save();
  ctx.translate(0, -cameraY);

  ctx.fillStyle = "#3aa7ff";
  platforms.forEach(p=>ctx.fillRect(p.x,p.y,p.w,p.h));

  drawPlayer(player.x, player.y);

  ctx.restore();

  ctx.fillStyle="white";
  ctx.fillText("高さ: " + Math.floor(maxHeight), 20, 30);
}

function loop(){ update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
